<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spaces Poker</title>
    <meta name="description" content="Play No-Limit Hold'em while listening to X Spaces. Live AI narration calls the action." />

    <!-- Open Graph for link previews on X, Discord, etc. Including
         these helps social-media scrapers render a clean card instead
         of fetching the empty SPA shell. -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Spaces Poker" />
    <meta property="og:description" content="Play No-Limit Hold'em while listening to X Spaces. Live AI narration calls the action." />
    <meta property="og:site_name" content="Spaces Poker" />

    <!-- X / Twitter card. summary_large_image gives a wide card layout. -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Spaces Poker" />
    <meta name="twitter:description" content="Play No-Limit Hold'em while listening to X Spaces. Live AI narration calls the action." />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
