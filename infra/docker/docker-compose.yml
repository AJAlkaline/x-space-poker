services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: poker
      POSTGRES_PASSWORD: poker
      POSTGRES_DB: poker
    ports:
      # Host-side 15432 → container 5432. The 15432 host port avoids
      # conflicts with any local Postgres install on 5432 and is well
      # outside the Windows Hyper-V/WSL2 reserved port ranges.
      - "15432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U poker"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      # Host-side 16379 → container 6379. The 16379 host port is well
      # outside Windows Hyper-V/WSL2 reserved port ranges (which often
      # cover 6000-7000ish on Windows hosts).
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres-data:
